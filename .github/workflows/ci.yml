name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # next-env.d.ts is generated by Next and gitignored; recreate its ambient
      # references so tsc can resolve Next + image imports without a full build.
      - name: Generate Next ambient types
        run: printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run
